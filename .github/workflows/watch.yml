name: CROUS watcher

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: crous-watcher
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Chercher un logement
        run: node watch.js
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}

      - name: Sauvegarder l'état (logements déjà vus)
        run: |
          git config user.name "crous-watcher-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update seen listings"
          git push
